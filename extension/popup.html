<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSSBattle Archive</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 13px;
    }
    .header {
      background: linear-gradient(135deg, #16213e, #0f3460);
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #ffcc00;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 span { font-size: 18px; }
    .header p { font-size: 11px; color: #8899aa; margin-top: 4px; }
    .section {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #667788;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.green { background: #00e676; box-shadow: 0 0 6px #00e67644; }
    .status-dot.red { background: #ff5252; box-shadow: 0 0 6px #ff525244; }
    .status-dot.yellow { background: #ffd740; box-shadow: 0 0 6px #ffd74044; }
    .token-input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 10px;
      color: #e0e0e0;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      outline: none;
      transition: border-color 0.2s;
    }
    .token-input:focus { border-color: #ffcc00; }
    .token-input::placeholder { color: #484f58; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      margin-top: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #ffcc00, #f5a623);
      color: #1a1a2e;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px #ffcc0033; }
    .btn-secondary {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
    }
    .btn-secondary:hover { background: #30363d; }
    .last-sub {
      background: #0d1117;
      border-radius: 8px;
      padding: 12px;
      border: 1px solid #21262d;
    }
    .last-sub .name { font-weight: 600; color: #ffcc00; font-size: 13px; }
    .last-sub .meta { font-size: 11px; color: #8b949e; margin-top: 4px; }
    .last-sub .stats {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .stat-value { font-size: 16px; font-weight: 700; color: #58a6ff; }
    .stat-label { font-size: 9px; text-transform: uppercase; color: #667788; letter-spacing: 0.5px; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      margin-top: 6px;
    }
    .badge-create { background: #238636; color: #fff; }
    .badge-update { background: #1f6feb; color: #fff; }
    .badge-ignore { background: #484f58; color: #c9d1d9; }
    .empty { text-align: center; padding: 16px; color: #484f58; font-style: italic; }
    .msg {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 11px;
      margin-top: 8px;
      display: none;
    }
    .msg-success { background: #23863622; border: 1px solid #23863644; color: #56d364; display: block; }
    .msg-error { background: #da363322; border: 1px solid #da363344; color: #f85149; display: block; }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>{X}</span> CSSBattle Archive</h1>
    <p>Auto-publish solutions to GitHub</p>
  </div>

  <div class="section">
    <div class="section-title">Connection Status</div>
    <div class="status-row" id="github-status">
      <div class="status-dot yellow"></div>
      <span>Checking GitHub connection...</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">GitHub Token</div>
    <input type="password" class="token-input" id="token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
    <p style="font-size: 10px; color: #667788; margin-top: 6px;">Classic PAT with the <strong>repo</strong> scope, or a fine-grained token with Contents read/write access.</p>
    <button class="btn btn-primary" id="save-token">💾 Save Token</button>
    <button class="btn btn-secondary" id="test-btn">🔗 Test Connection</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="section">
    <div class="section-title">Last Submission</div>
    <div id="last-sub-container">
      <div class="empty">No submissions captured yet.<br>Submit a CSSBattle solution to get started!</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
