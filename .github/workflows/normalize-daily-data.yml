name: Normalize Daily Data

on:
  push:
    branches: [main]
    paths:
      - "data/daily/**/*.json"

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Repair generated daily names
        run: node scripts/validate-daily-data.mjs --fix

      - name: Commit repaired data
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily
          git commit -m "fix: normalize daily target names"
          git push
